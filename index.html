<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de tarefas</title>
<link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<div class="app">

    <header>
        <h1>Gestão de tarefas</h1>
    </header>

    <!-- INPUT -->
    <div class="input-box">
        <input id="taskInput" placeholder="Nova tarefa..." />
        
        <select id="priority">
            <option value="low">Baixa</option>
            <option value="medium">Média</option>
            <option value="high">Alta</option>
        </select>

        <button id="addBtn">Adicionar</button>
    </div>

    <!-- SEARCH -->
    <input id="search" placeholder="Pesquisar tarefas..." />

    <!-- FILTERS -->
    <div class="filters">
        <button data-filter="all">Todas</button>
        <button data-filter="pending">Pendentes</button>
        <button data-filter="done">Concluídas</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <span>Total: <b id="total"></b></span>
        <span>Pendentes: <b id="pending"></b></span>
        <span>Concluídas: <b id="done"></b></span>
    </div>

    <!-- LIST -->
    <ul id="taskList"></ul>


<footer class="footer">
    © 2026 
    <span class="brand">
        <span class="elo">Elo</span><span class="tec">Tec</span>
    </span>
    - Todos os direitos reservados
</footer>
</div>

<script src="js/app.js" type="module"></script>

</body>
</html>
